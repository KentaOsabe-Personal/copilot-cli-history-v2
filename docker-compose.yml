services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: copilot-cli-history-frontend
    working_dir: /app
    command: bash -c "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 51730"
    ports:
      - "51730:51730"
    volumes:
      - ./frontend:/app
      - frontend_pnpm_store:/pnpm/store
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOME: /tmp
      VITE_API_BASE_URL: http://localhost:30000

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: copilot-cli-history-backend
    working_dir: /app
    command: python -m django runserver 0.0.0.0:30000
    ports:
      - "30000:30000"
    volumes:
      - ./backend:/app
      - ./.kiro:/workspace/.kiro:ro
      - ~/.copilot:/root/.copilot:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      DJANGO_SETTINGS_MODULE: backend_config.settings
      PYTHONUNBUFFERED: "1"
      COPILOT_HOME: /root/.copilot
      HISTORY_API_REPOSITORY_BACKEND: bigquery
      BIGQUERY_PROJECT_ID: project-d53e5021-e5a2-49c9-a4b
      BIGQUERY_DATASET_ID: copilot_cli_history_v2
      BIGQUERY_LOCATION: asia-northeast1
      BIGQUERY_TABLE_PREFIX: ""
      BIGQUERY_READ_MODEL_INTEGRATION: 1
volumes:
  frontend_pnpm_store:
