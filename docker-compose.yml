services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: copilot-cli-history-frontend
    working_dir: /app
    command: bash -c "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 51730"
    ports:
      - "51730:51730"
    volumes:
      - ./frontend:/app
      - frontend_pnpm_store:/pnpm/store
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOME: /tmp
      VITE_API_BASE_URL: http://localhost:30000

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: copilot-cli-history-backend
    working_dir: /app
    command: python -m django runserver 0.0.0.0:30000
    ports:
      - "30000:30000"
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: backend_config.settings
      PYTHONUNBUFFERED: "1"

  mysql:
    image: mysql:9.7
    container_name: copilot-cli-history-mysql
    ports:
      - "33006:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: copilot_cli_history_development
      MYSQL_USER: copilot
      MYSQL_PASSWORD: copilot
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  frontend_pnpm_store:
  mysql_data:
