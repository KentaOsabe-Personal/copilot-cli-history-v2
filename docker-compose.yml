services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: copilot-cli-history-frontend
    working_dir: /app
    command: bash -c "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 51730"
    ports:
      - "51730:51730"
    volumes:
      - ./frontend:/app
      - frontend_pnpm_store:/pnpm/store
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOME: /tmp
      VITE_API_BASE_URL: http://localhost:30000

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: copilot-cli-history-backend
    working_dir: /app
    command: bash -c "rm -f tmp/pids/server.pid && bundle install && bin/rails db:prepare && exec bin/rails server -b 0.0.0.0 -p 30000"
    ports:
      - "30000:30000"
    volumes:
      - ./backend:/app
      - ./.kiro:/workspace/.kiro:ro
      - ${HOME}/.copilot:/copilot-home:ro
      - backend_bundle:/usr/local/bundle
      - backend_tmp:/app/tmp
      - backend_log:/app/log
    environment:
      COPILOT_HOME: /copilot-home
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: copilot_cli_history_development
      DB_TEST_NAME: copilot_cli_history_test
      DB_USERNAME: copilot
      DB_PASSWORD: copilot
      RAILS_ENV: development
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:9.7
    container_name: copilot-cli-history-mysql
    ports:
      - "33006:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: copilot_cli_history_development
      MYSQL_USER: copilot
      MYSQL_PASSWORD: copilot
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  backend_bundle:
  backend_log:
  backend_tmp:
  frontend_pnpm_store:
  mysql_data:
